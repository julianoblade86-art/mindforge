<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MindForge: AI Tycoon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- ===== HEADER / HUD ===== -->
  <header class="header">
    <div class="header__top">
      <div class="header__brand">
        <span class="header__brand-title" id="app-title">MindForge</span>
        <span class="header__brand-subtitle" id="app-subtitle">AI TYCOON</span>
        <span class="demo-badge" id="demo-badge">DEMO</span>
      </div>
      <div class="header__right">
        <button class="icon-btn" id="settings-toggle" aria-label="Settings">⚙️</button>
      </div>
    </div>

    <div class="stage-banner">
      <span class="stage-banner__name" id="hud-stage">Garagem</span>
    </div>
    <div class="progress-bar">
      <div class="progress-bar__fill" id="hud-stage-progress" style="width:0%"></div>
    </div>

    <div class="hud-stats">
      <div class="hud-stat hud-stat--money" id="hud-money-wrapper">
        <div class="hud-stat__label" id="label-money">Caixa</div>
        <div class="hud-stat__value" id="hud-money">$0</div>
      </div>
      <div class="hud-stat hud-stat--production">
        <div class="hud-stat__label">Produção</div>
        <div class="hud-stat__value" id="hud-production">$0/s</div>
      </div>
      <div class="hud-stat">
        <div class="hud-stat__label" id="label-clients">Clientes</div>
        <div class="hud-stat__value" id="hud-clients">0</div>
      </div>
      <div class="hud-stat">
        <div class="hud-stat__label" id="label-reputation">Reputação</div>
        <div class="hud-stat__value" id="hud-reputation">0</div>
      </div>
    </div>

    <button class="click-btn" id="click-work-btn" aria-label="Trabalhar manualmente">
      <span class="click-btn__icon">💻</span>
      <span class="click-btn__label" id="click-btn-label">Trabalhar</span>
      <span class="click-btn__value" id="click-btn-value">+$3</span>
    </button>

    <div class="settings-panel" id="settings-panel">
      <div class="settings-row">
        <span id="settings-lang-label">Idioma</span>
        <select id="language-select">
          <option value="pt">🇧🇷 Português</option>
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
        </select>
      </div>
      <div class="settings-row">
        <span id="settings-reset-label">Apagar progresso</span>
        <button class="btn--danger-outline" id="reset-save-btn">🗑️</button>
      </div>
    </div>
  </header>

  <!-- ===== TABS ===== -->
  <nav class="tab-bar">
    <button class="tab-btn" id="tabbtn-team" data-tab="team">👥 Equipe</button>
    <button class="tab-btn" id="tabbtn-research" data-tab="research">🔬 Pesquisa</button>
    <button class="tab-btn" id="tabbtn-contracts" data-tab="contracts">📜 Contratos</button>
    <button class="tab-btn" id="tabbtn-world" data-tab="world">🌍 Mundo</button>
    <button class="tab-btn" id="tabbtn-stats" data-tab="stats">📊 Estatísticas</button>
  </nav>

  <main class="tab-content">
    <section class="tab-panel" id="panel-team"></section>
    <section class="tab-panel" id="panel-research"></section>
    <section class="tab-panel" id="panel-contracts"></section>
    <section class="tab-panel" id="panel-world"></section>
    <section class="tab-panel" id="panel-stats"></section>
  </main>

</div>

<!-- ===== TOASTS ===== -->
<div id="toast-container"></div>

<!-- ===== MODAL: BOAS-VINDAS ===== -->
<div class="modal" id="modal-welcome">
  <div class="modal__box">
    <div class="modal__icon">🤖</div>
    <div class="modal__title" id="welcome-title">Bem-vindo ao MindForge</div>
    <div class="modal__desc" id="welcome-desc">Você tem um notebook velho, uma ideia e zero dinheiro.</div>
    <button class="btn--buy" id="welcome-start">Começar</button>
  </div>
</div>

<!-- ===== MODAL: LIMITE DA DEMO ===== -->
<div class="modal" id="modal-democap">
  <div class="modal__box">
    <div class="modal__icon">🔒</div>
    <div class="modal__title" id="democap-title">Você alcançou o limite da demonstração.</div>
    <div class="modal__desc" id="democap-desc">A expansão global está disponível na versão completa.</div>
    <button class="btn--buy" id="democap-buy">Comprar versão completa — $4.99</button>
    <button class="btn--ghost" id="democap-continue">Continuar explorando a demo</button>
  </div>
</div>

<!-- ===== SCRIPTS (ordem importa) ===== -->
<script src="data/lang_pt.js"></script>
<script src="data/lang_en.js"></script>
<script src="data/lang_es.js"></script>
<script src="data/gameData.js"></script>

<script src="js/i18n.js"></script>
<script src="js/state.js"></script>
<script src="js/economy.js"></script>
<script src="js/contracts.js"></script>
<script src="js/events.js"></script>
<script src="js/rival.js"></script>
<script src="js/toast.js"></script>

<script src="js/ui_team.js"></script>
<script src="js/ui_contracts_world.js"></script>
<script src="js/ui_stats_hud.js"></script>
<script src="js/ui_modals.js"></script>
<script src="js/ui.js"></script>

<script src="js/actions.js"></script>
<script src="js/main.js"></script>

</body>
</html>
